name: CI

on:
  push:
    paths-ignore:
      - '**/*.md'
  pull_request:
    paths-ignore:
      - '**/*.md'

# First build on Linux and test with JDK 25
# Then run tests with various Gradle and JDK versions
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-use"
          build-scan-terms-of-use-agree: "yes"

      - name: Build with Gradle
        id: gradle-build
        run: ./gradlew build

      - name: Store reports
        if: always() && (steps.gradle-build.outcome == 'success' || steps.gradle-build.outcome == 'failure')
        uses: actions/upload-artifact@v7
        with:
          name: build-reports
          path: build/reports/

  # Test some combinations of Gradle versions (thus Kotlin versions) and JDKs.
  # Use the first Gradle version compatible with each JDK, using Gradle 6.8 (first to ship with Kotlin 1.4) as the lower end,
  # assuming that all intermediate versions between that and the current one will be compatible.
  compatibility-test:
    needs: linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - gradle: '8.14.4'
            java: '21'
          - gradle: '7.3.3'
            java: '17'
          - gradle: '6.8.3'
            java: '11'
          - gradle: '6.8.3'
            java: '8'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: |
            ${{ matrix.java }}
            25

      - name: Setup environment
        run: |
          echo "org.gradle.java.installations.auto-download=false" | tee -a gradle.properties
          echo "org.gradle.java.installations.fromEnv=JAVA_HOME_${{ matrix.java }}_X64" | tee -a gradle.properties

      - uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-use"
          build-scan-terms-of-use-agree: "yes"

      - name: Build with Gradle
        id: gradle-build
        run: ./gradlew integrationTest ${{ case(matrix.gradle != null, format('"-Ptest.gradle-version={0}"', matrix.gradle), '') }} "-Ptest.java-toolchain=${{ matrix.java }}"

      - name: Store reports
        if: always() && (steps.gradle-build.outcome == 'success' || steps.gradle-build.outcome == 'failure')
        uses: actions/upload-artifact@v7
        with:
          name: jdk-${{ matrix.java }}-tests
          path: build/reports/tests/integrationTest/
